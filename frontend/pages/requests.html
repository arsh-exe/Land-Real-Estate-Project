<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Requests • Land Registry System</title>
    <link rel="stylesheet" href="/assets/css/styles.css?v=20260416b" />

  <body data-auth="private">
    <header id="navbar-root"></header>

    <main class="container">
      <section class="page-header">

      <details id="section-pending" class="card collapsible-card mt-1">

      <details id="section-rejected" class="card collapsible-card mt-1">

          <span class="collapsible-icon" aria-hidden="true"></span>
        </summary>
        <div id="requests-rejected-root" class="list"></div>
      </details>

      <details id="section-transactions" class="card collapsible-card mt-1">

          <h3>Transaction History</h3>
          <span class="collapsible-icon" aria-hidden="true"></span>

    <footer class="footer">Request processing and transaction tracking</footer>

    <script src="/assets/js/api.js"></script>
