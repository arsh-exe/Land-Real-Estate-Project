name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fix absolute paths for GitHub Pages
        run: |
          find ./frontend -type f -name "*.html" -exec sed -i 's|href="/|href="/Land-Real-Estate-Project/|g' {} +
          find ./frontend -type f -name "*.html" -exec sed -i 's|src="/|src="/Land-Real-Estate-Project/|g' {} +
          find ./frontend -type f -name "*.html" -exec sed -i 's|action="/|action="/Land-Real-Estate-Project/|g' {} +
          find ./frontend -type f -name "*.js" -exec sed -i 's|href: "/|href: "/Land-Real-Estate-Project/|g' {} +
          find ./frontend -type f -name "*.js" -exec sed -i 's|href="/|href="/Land-Real-Estate-Project/|g' {} +
          find ./frontend -type f -name "*.js" -exec sed -i 's|src="/|src="/Land-Real-Estate-Project/|g' {} +
          find ./frontend -type f -name "*.js" -exec sed -i 's|window.location.href = "/|window.location.href = "/Land-Real-Estate-Project/|g' {} +
          find ./frontend -type f -name "*.js" -exec sed -i 's|window.location.href="/|window.location.href="/Land-Real-Estate-Project/|g' {} +
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
